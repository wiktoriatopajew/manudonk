{% extends "base.html" %}

{% block content %}
<!-- Hero Section with Animated Gradient (same as homepage) -->
<div class="relative overflow-hidden bg-gradient-to-br from-black via-gray-900 to-yellow-900 text-white min-h-screen flex items-center justify-center">
    <!-- Animated gradient overlay -->
    <div class="absolute inset-0 bg-gradient-to-tr from-yellow-500/20 via-yellow-600/20 to-black/20 animate-pulse"></div>
    
    <!-- Decorative circles -->
    <div class="absolute top-20 left-10 w-72 h-72 bg-yellow-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
    <div class="absolute top-40 right-10 w-72 h-72 bg-yellow-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-8 left-1/2 w-72 h-72 bg-yellow-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-4000"></div>

    <div class="relative max-w-md w-full mx-4 backdrop-blur-sm bg-white/95 rounded-2xl shadow-2xl p-8 border border-yellow-500/20">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <div class="w-20 h-20 rounded-full shadow-xl bg-gradient-to-br from-yellow-500 to-yellow-600 flex items-center justify-center">
                    <img src="/static/images/logo.png" alt="Manual Bear Logo" class="w-16 h-16 object-contain">
                </div>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">
                Sign In
            </h2>
            <p class="text-gray-600">Welcome back!</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                    Email Address
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:border-transparent text-gray-900"
                    placeholder="your@email.com"
                >
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    Password
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:border-transparent text-gray-900"
                    placeholder="••••••••"
                >
            </div>
            
            <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg"></div>
            
            <button 
                type="submit"
                class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 text-black py-3 px-4 rounded-lg font-bold hover:from-yellow-400 hover:to-yellow-500 transition shadow-lg transform hover:scale-105 active:scale-95"
            >
                Sign In
            </button>
        </form>
        
        <div class="mt-4 text-center">
            <a href="/forgot-password" class="text-sm text-yellow-600 hover:text-yellow-700 font-medium">
                Forgot your password?
            </a>
        </div>
        
        <div class="mt-4 text-center space-y-2">
            <p class="text-gray-600">
                Don't have an account? 
                <a href="/register" class="text-yellow-600 hover:text-yellow-700 font-semibold">Register</a>
            </p>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-message');
    
    try {
        const formData = new FormData();
        formData.append('username', email);  // OAuth2 uses 'username' field
        formData.append('password', password);
        
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            body: formData
        });
        
        if (response.ok) {
            const data = await response.json();
            // Store token
            localStorage.setItem('access_token', data.access_token);
            
            // Redirect based on user role
            if (data.is_admin) {
                window.location.href = '/admin';
            } else {
                window.location.href = '/';
            }
        } else {
            // Handle error responses
            let errorMessage = 'Login failed. Please try again.';
            
            // Try to parse JSON error response
            try {
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    
                    // Show specific error message based on status code
                    if (response.status === 401) {
                        errorMessage = 'Incorrect email or password';
                    } else if (response.status === 403) {
                        errorMessage = data.detail || 'Email not verified. Please check your email.';
                    } else {
                        errorMessage = data.detail || 'Login failed. Please try again.';
                    }
                } else {
                    // HTML error page returned (likely 500 error)
                    if (response.status === 401) {
                        errorMessage = 'Incorrect email or password';
                    } else if (response.status === 500) {
                        errorMessage = 'Server error. Please try again later.';
                    }
                }
            } catch (parseError) {
                console.error('Error parsing response:', parseError);
                // Fallback to status-based messages
                if (response.status === 401) {
                    errorMessage = 'Incorrect email or password';
                } else if (response.status === 500) {
                    errorMessage = 'Server error. Please try again later.';
                }
            }
            
            errorDiv.textContent = errorMessage;
            errorDiv.classList.remove('hidden');
        }
    } catch (error) {
        // Only network errors
        console.error('Login error:', error);
        errorDiv.textContent = 'Connection error. Please check your internet connection.';
        errorDiv.classList.remove('hidden');
    }
});
</script>
{% endblock %}
