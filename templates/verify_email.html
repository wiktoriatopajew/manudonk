{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-purple-600 via-blue-600 to-indigo-700 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full backdrop-blur-sm bg-white/95 rounded-2xl shadow-2xl p-8 border border-white/20">
        <div class="text-center mb-8">
            <div class="bg-gradient-to-br from-purple-100 to-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">
                Verify Your Email
            </h2>
            <p class="text-gray-600">We sent a 6-digit code to</p>
            <p class="text-purple-600 font-semibold">{{ email }}</p>
        </div>
        
        <form id="verifyForm" class="space-y-6">
            <div>
                <label for="code" class="block text-sm font-medium text-gray-700 mb-2 text-center">
                    Enter Verification Code
                </label>
                <input 
                    type="text" 
                    id="code" 
                    name="code" 
                    required
                    maxlength="6"
                    pattern="[0-9]{6}"
                    class="w-full px-4 py-4 text-center text-2xl font-bold tracking-widest border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                    placeholder="000000"
                >
                <p class="text-xs text-gray-500 mt-2 text-center">Code expires in 15 minutes</p>
            </div>
            
            <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-center"></div>
            <div id="success-message" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-center"></div>
            
            <button 
                type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 px-4 rounded-lg font-semibold hover:from-purple-700 hover:to-blue-700 transition shadow-lg transform hover:scale-105 active:scale-95"
            >
                Verify Email
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <button 
                id="resendBtn"
                class="text-purple-600 hover:text-purple-800 font-semibold"
            >
                Resend Code
            </button>
        </div>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const email = urlParams.get('email');

document.getElementById('verifyForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const code = document.getElementById('code').value;
    const errorDiv = document.getElementById('error-message');
    const successDiv = document.getElementById('success-message');
    
    try {
        const response = await fetch('/api/auth/verify-email', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email, code })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            successDiv.textContent = 'Email verified successfully! Redirecting...';
            successDiv.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            
            // Auto-login and redirect
            localStorage.setItem('access_token', data.access_token);
            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        } else {
            errorDiv.textContent = data.detail || 'Verification failed';
            errorDiv.classList.remove('hidden');
            successDiv.classList.add('hidden');
        }
    } catch (error) {
        errorDiv.textContent = 'Network error. Please try again.';
        errorDiv.classList.remove('hidden');
        successDiv.classList.add('hidden');
    }
});

document.getElementById('resendBtn').addEventListener('click', async () => {
    const errorDiv = document.getElementById('error-message');
    const successDiv = document.getElementById('success-message');
    
    try {
        const response = await fetch('/api/auth/resend-code', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email })
        });
        
        if (response.ok) {
            successDiv.textContent = 'New code sent to your email!';
            successDiv.classList.remove('hidden');
            errorDiv.classList.add('hidden');
        } else {
            errorDiv.textContent = 'Failed to resend code';
            errorDiv.classList.remove('hidden');
            successDiv.classList.add('hidden');
        }
    } catch (error) {
        errorDiv.textContent = 'Network error';
        errorDiv.classList.remove('hidden');
        successDiv.classList.add('hidden');
    }
});
</script>
{% endblock %}
